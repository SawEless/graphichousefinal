<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphic House - Professional Admin Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0f0f1a; }
        
        .bg-animation {
            position: fixed;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            z-index: -2;
        }
        
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 50px;
            width: 480px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        
        .dashboard { display: none; }
        
        .sidebar {
            width: 280px;
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            color: white;
            overflow-y: auto;
        }
        
        .sidebar-header {
            padding: 30px 25px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .nav-item {
            padding: 15px 25px;
            margin: 5px 15px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            color: rgba(255,255,255,0.7);
            transition: all 0.3s;
        }
        
        .nav-item:hover, .nav-item.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: translateX(5px);
        }
        
        .main-content {
            margin-left: 280px;
            padding: 30px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 25px;
            transition: all 0.3s;
        }
        
        .stat-value {
            font-size: 36px;
            font-weight: 800;
            color: #333;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-danger { background: #ff4757; color: white; }
        .btn-success { background: #00b894; color: white; }
        .btn-warning { background: #fdcb6e; color: #333; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal.active { display: flex; }
        
        .modal-content {
            background: white;
            border-radius: 25px;
            padding: 35px;
            width: 90%;
            max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
        }
        
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
        }
        
        .image-upload-area {
            border: 2px dashed #ddd;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
        }
        
        .image-preview {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        
        .preview-img {
            width: 80px;
            height: 80px;
            border-radius: 10px;
            object-fit: cover;
            border: 2px solid #667eea;
        }
        
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }
        
        .service-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        
        .service-img { width: 100%; height: 250px; object-fit: cover; }
        .service-info { padding: 20px; }
        .service-price { color: #667eea; font-size: 28px; font-weight: bold; }
        
        .data-table {
            background: white;
            border-radius: 20px;
            overflow: hidden;
        }
        
        .data-table table { width: 100%; border-collapse: collapse; }
        .data-table th, .data-table td {
            padding: 15px 20px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        .data-table th { background: #f8f9fa; }
        
        .category-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="bg-animation"></div>

<!-- Login -->
<div id="loginScreen" class="login-wrapper">
    <div class="login-card">
        <div style="text-align: center; margin-bottom: 30px;">
            <i class="fas fa-print" style="font-size: 70px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;"></i>
            <h2 style="margin-top: 15px;">Graphic House</h2>
            <p style="color: #888;">Enterprise Admin Dashboard</p>
        </div>
        <div class="form-group">
            <label>Email / Username</label>
            <input type="text" id="loginEmail" placeholder="admin@graphichouse.com.np">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="admin123">
        </div>
        <button class="btn btn-primary" style="width: 100%;" onclick="login()">
            <i class="fas fa-arrow-right"></i> Login to Dashboard
        </button>
    </div>
</div>

<!-- Dashboard -->
<div id="dashboard" class="dashboard">
    <div class="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-crown" style="font-size: 45px;"></i>
            <h3>Graphic House</h3>
        </div>
        <div class="nav-item active" onclick="loadSection('dashboard')">
            <i class="fas fa-chart-pie"></i> Dashboard
        </div>
        <div class="nav-item" onclick="loadSection('services')">
            <i class="fas fa-box"></i> Services
        </div>
        <div class="nav-item" onclick="loadSection('categories')">
            <i class="fas fa-tags"></i> Categories
        </div>
        <div class="nav-item" onclick="loadSection('settings')">
            <i class="fas fa-cog"></i> Settings
        </div>
        <div class="nav-item" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i> Logout
        </div>
    </div>
    
    <div class="main-content">
        <div id="dashboardContent"></div>
    </div>
</div>

<!-- Add Service Modal -->
<div id="serviceModal" class="modal">
    <div class="modal-content">
        <h2><i class="fas fa-plus-circle"></i> Add New Service</h2>
        <form id="serviceForm">
            <div class="form-group">
                <label>Service Name *</label>
                <input type="text" id="serviceName" required>
            </div>
            <div class="form-group">
                <label>Category *</label>
                <select id="category" required></select>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="description" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label>Base Price (NPR) *</label>
                <input type="number" id="basePrice" required>
            </div>
            <div class="form-group">
                <label>Upload Image</label>
                <div class="image-upload-area" onclick="document.getElementById('imageFile').click()">
                    <i class="fas fa-cloud-upload-alt" style="font-size: 40px; color: #667eea;"></i>
                    <p>Click to select image from computer</p>
                </div>
                <input type="file" id="imageFile" accept="image/*" style="display: none;" onchange="previewImage(this)">
                <div id="imagePreview" class="image-preview"></div>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button type="submit" class="btn btn-primary">Save Service</button>
                <button type="button" class="btn" onclick="closeModal()">Cancel</button>
            </div>
        </form>
    </div>
</div>

<!-- Add Category Modal -->
<div id="categoryModal" class="modal">
    <div class="modal-content">
        <h2><i class="fas fa-tag"></i> Add New Category</h2>
        <form id="categoryForm">
            <div class="form-group">
                <label>Category Name *</label>
                <input type="text" id="categoryName" required placeholder="e.g., Custom Mugs">
            </div>
            <div class="form-group">
                <label>Icon (Font Awesome)</label>
                <input type="text" id="categoryIcon" placeholder="fa-mug-hot">
                <small>Find icons at fontawesome.com</small>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button type="submit" class="btn btn-primary">Add Category</button>
                <button type="button" class="btn" onclick="closeCategoryModal()">Cancel</button>
            </div>
        </form>
    </div>
</div>

<script>
    let currentImageBase64 = null;
    let categories = [];
    
    if (localStorage.getItem('token')) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        loadCategories();
        loadSection('dashboard');
    }
    
    async function login() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        
        const res = await fetch('/api/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        
        if (res.ok) {
            const data = await res.json();
            localStorage.setItem('token', data.token);
            localStorage.setItem('userEmail', email);
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            await loadCategories();
            loadSection('dashboard');
        } else {
            alert('Login failed! Use admin@graphichouse.com.np / admin123');
        }
    }
    
    async function loadCategories() {
        const res = await fetch('/api/categories');
        categories = await res.json();
        
        // Update category dropdown in service form
        const select = document.getElementById('category');
        if (select) {
            select.innerHTML = categories.map(c => `<option value="${c.slug}">${c.name}</option>`).join('');
        }
    }
    
    function previewImage(input) {
        const previewDiv = document.getElementById('imagePreview');
        previewDiv.innerHTML = '';
        
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                currentImageBase64 = e.target.result;
                const img = document.createElement('img');
                img.src = e.target.result;
                img.className = 'preview-img';
                previewDiv.appendChild(img);
            };
            reader.readAsDataURL(input.files[0]);
        }
    }
    
    document.getElementById('serviceForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const service = {
            name: document.getElementById('serviceName').value,
            category: document.getElementById('category').value,
            description: document.getElementById('description').value,
            basePrice: parseFloat(document.getElementById('basePrice').value),
            images: currentImageBase64 ? [currentImageBase64] : [],
            bulkPrices: []
        };
        
        const res = await fetch('/api/services', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(service)
        });
        
        if (res.ok) {
            alert('✅ Service added successfully!');
            closeModal();
            loadSection('services');
            document.getElementById('serviceForm').reset();
            document.getElementById('imagePreview').innerHTML = '';
            currentImageBase64 = null;
        } else {
            alert('❌ Failed to add service');
        }
    });
    
    document.getElementById('categoryForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const category = {
            name: document.getElementById('categoryName').value,
            icon: document.getElementById('categoryIcon').value || 'fa-tag'
        };
        
        const res = await fetch('/api/categories', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(category)
        });
        
        if (res.ok) {
            alert('✅ Category added successfully!');
            closeCategoryModal();
            await loadCategories();
            loadSection('categories');
        } else {
            alert('❌ Failed to add category');
        }
    });
    
    function openModal() {
        document.getElementById('serviceModal').classList.add('active');
        loadCategories();
    }
    
    function closeModal() {
        document.getElementById('serviceModal').classList.remove('active');
    }
    
    function openCategoryModal() {
        document.getElementById('categoryModal').classList.add('active');
    }
    
    function closeCategoryModal() {
        document.getElementById('categoryModal').classList.remove('active');
        document.getElementById('categoryForm').reset();
    }
    
    async function loadSection(section) {
        const contentDiv = document.getElementById('dashboardContent');
        
        if (section === 'dashboard') {
            const stats = await fetch('/api/admin/stats').then(r => r.json());
            contentDiv.innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value">${stats.totalServices}</div>
                        <div>Total Services</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${categories.length}</div>
                        <div>Categories</div>
                    </div>
                </div>
                <div class="stat-card" style="margin-top: 20px;">
                    <h3>Quick Actions</h3>
                    <button class="btn btn-primary" onclick="openModal()">➕ Add Service</button>
                    <button class="btn btn-success" onclick="openCategoryModal()">🏷️ Add Category</button>
                </div>
            `;
        }
        else if (section === 'services') {
            const services = await fetch('/api/services').then(r => r.json());
            contentDiv.innerHTML = `
                <div style="margin-bottom: 20px;">
                    <button class="btn btn-primary" onclick="openModal()">➕ Add Service</button>
                </div>
                <div class="services-grid" id="servicesGrid"></div>
            `;
            
            const grid = document.getElementById('servicesGrid');
            if (services.length === 0) {
                grid.innerHTML = '<div style="text-align: center; padding: 50px; background: white; border-radius: 20px;">No services yet. Click "Add Service" to start.</div>';
            } else {
                grid.innerHTML = services.map(service => `
                    <div class="service-card">
                        <img src="${service.images[0] || 'https://via.placeholder.com/350x250?text=No+Image'}" class="service-img">
                        <div class="service-info">
                            <h3>${service.name}</h3>
                            <p>${service.description || ''}</p>
                            <div class="service-price">NPR ${service.basePrice}</div>
                            <button class="btn btn-danger" onclick="deleteService('${service._id}')">Delete</button>
                        </div>
                    </div>
                `).join('');
            }
        }
        else if (section === 'categories') {
            contentDiv.innerHTML = `
                <div style="margin-bottom: 20px;">
                    <button class="btn btn-success" onclick="openCategoryModal()">➕ Add Category</button>
                </div>
                <div class="data-table">
                    <table>
                        <thead><tr><th>Category Name</th><th>Icon</th><th>Slug</th><th>Actions</th></tr></thead>
                        <tbody id="categoriesList"></tbody>
                    </table>
                </div>
            `;
            
            const tbody = document.getElementById('categoriesList');
            tbody.innerHTML = categories.map(cat => `
                <tr>
                    <td>${cat.name}</td>
                    <td><i class="fas ${cat.icon}"></i></td>
                    <td>${cat.slug}</td>
                    <td><button class="btn btn-danger" onclick="deleteCategory('${cat.id}')">Delete</button></td>
                </tr>
            `).join('');
        }
        else if (section === 'settings') {
            const userEmail = localStorage.getItem('userEmail') || 'admin@graphichouse.com.np';
            contentDiv.innerHTML = `
                <div class="data-table" style="padding: 30px;">
                    <h3>Change Password</h3>
                    <form id="passwordForm">
                        <div class="form-group">
                            <label>Current Password</label>
                            <input type="password" id="currentPassword" required>
                        </div>
                        <div class="form-group">
                            <label>New Password</label>
                            <input type="password" id="newPassword" required>
                        </div>
                        <div class="form-group">
                            <label>Confirm New Password</label>
                            <input type="password" id="confirmPassword" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Change Password</button>
                    </form>
                </div>
            `;
            
            document.getElementById('passwordForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const newPassword = document.getElementById('newPassword').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                
                if (newPassword !== confirmPassword) {
                    alert('New passwords do not match!');
                    return;
                }
                
                const res = await fetch('/api/admin/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: userEmail,
                        currentPassword: document.getElementById('currentPassword').value,
                        newPassword: newPassword
                    })
                });
                
                if (res.ok) {
                    alert('✅ Password changed successfully! Please login again.');
                    logout();
                } else {
                    alert('❌ Current password is incorrect');
                }
            });
        }
        
        document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
        event.target.closest('.nav-item').classList.add('active');
    }
    
    async function deleteService(id) {
        if (confirm('Delete this service?')) {
            await fetch(`/api/services/${id}`, { method: 'DELETE' });
            loadSection('services');
        }
    }
    
    async function deleteCategory(id) {
        if (confirm('Delete this category? Services in this category will need reassignment.')) {
            await fetch(`/api/categories/${id}`, { method: 'DELETE' });
            await loadCategories();
            loadSection('categories');
        }
    }
    
    function logout() {
        localStorage.removeItem('token');
        localStorage.removeItem('userEmail');
        location.reload();
    }
</script>
</body>
</html>
